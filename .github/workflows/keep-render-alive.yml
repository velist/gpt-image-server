name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app (3 times with delay)
        run: |
          for i in 1 2 3; do
            echo "=== Ping #$i ==="
            curl --fail --silent --show-error \
              --max-time 60 \
              --retry 3 \
              --retry-delay 5 \
              "https://gpt-image-server-xhnm.onrender.com/" > /dev/null && break
            sleep 10
          done
